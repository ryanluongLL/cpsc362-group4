{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <div class="navbar-auth">
                <a class="btn btn-secondary" href="/">Home</a>
                <a class="btn btn-secondary" href="/accounts/signout">Sign Out</a>
            </div>
        </div>
    </nav>

    <main class="shell">
        <section class="hero">
            <div class="hero-panel">
                <p class="eyebrow">My Account</p>
                <h1 class="hero-title">{{user.username}}</h1>
                <p class="hero-copy">{{user.email}}</p>
            </div>
        </section>

        <section>
            <div class="detail-card" style="margin-top: 24px">
                <h2 class="section-title">Edit Profile</h2>
                <form method="post" style="margin-top: 16px;">
                    {% csrf_token %}
                    <div style="margin-bottom: 12px;">
                        <label>First Name</label><br>
                        <input class="search-input" type="text" 
                        name="first_name" value="{{profile.first_name}}">
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label>Last Name</label><br>
                        <input class="search-input" type="text" 
                        name="last_name" value="{{profile.last_name}}">
                    </div>

                    <div style="margin-bottom: 16px;">
                        <label>Phone Number</label><br>
                        <input class="search-input" type="text" 
                        name="phone_number" value="{{profile.phone_number}}">
                    </div>
                    <button class="btn btn-primary" type="submit">Save Changes</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
