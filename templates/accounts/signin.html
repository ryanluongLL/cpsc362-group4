{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Meow Mart</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/png" href="{% static 'favicon.png' %}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap');

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 20%, rgba(167, 243, 208, 0.24), transparent 28%),
                linear-gradient(135deg, #131921 0%, #2f3d37 48%, #83978d 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 24px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 24px;
            pointer-events: none;
            animation: frameGlow 4s ease-in-out infinite;
        }

        .login-card {
            width: 360px;
            background: #f4f7f5;
            border: 1px solid #9fb5aa;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 24px 70px rgba(19,25,33,0.42);
            animation: cardEnter 650ms ease-out both;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            font-size: 26px;
            font-family: "Poppins", Arial, sans-serif;
            font-weight: 800;
            color: #131921;
            margin-bottom: 10px;
        }

        .logo img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            padding: 5px;
            background: white;
            border: 1px solid #c8d3cd;
            border-radius: 50%;
            box-shadow: 0 8px 18px rgba(31,41,55,0.16);
            animation: iconFloat 3.4s ease-in-out infinite;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #33443b;
            font-weight: 600;
            margin-bottom: 25px;
        }

        h2 {
            text-align: center;
            color: #14532d;
            font-family: "Poppins", Arial, sans-serif;
            margin-bottom: 20px;
        }

        label {
            font-size: 13px;
            color: #26352e;
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 11px;
            margin-bottom: 15px;
            border: 1px solid #aebfb6;
            border-radius: 10px;
            outline: none;
            background: white;
            transition: 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #2f855a;
            box-shadow: 0 0 0 3px rgba(47,133,90,0.15);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #131921;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #276749;
            transform: translateY(-1px);
        }

        .error {
            position: fixed;
            top: 22px;
            right: 22px;
            max-width: 320px;
            background: #dcfce7;
            color: #14532d;
            border: 1px solid #86efac;
            padding: 12px 14px;
            border-radius: 999px;
            font-size: 13px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(19,25,33,0.22);
            animation: toastSlide 500ms ease-out both;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #33443b;
        }

        .footer a {
            color: #276749;
            font-weight: bold;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @keyframes cardEnter {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes iconFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes frameGlow {
            0%, 100% {
                border-color: rgba(255,255,255,0.12);
            }
            50% {
                border-color: rgba(167,243,208,0.32);
            }
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <img src="{% static 'meowmart_icon2.png' %}" alt="Meow Mart logo">
        <span>Meow Mart</span>
    </div>
    <div class="subtitle">Welcome back, shopper</div>

    <h2>Sign In</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username">

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password">

        <button class="btn" type="submit">Sign In</button>
    </form>

    <div class="footer">
        Don't have an account?
        <a href="/accounts/signup/">Sign Up</a>
    </div>

</div>

</body>
</html>
