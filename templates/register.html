{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register - Meow Mart</title>
        <link rel="stylesheet" href="{% static 'styles.css' %}">
    </head>
    <body>
        <main class="shell">
            <section class="hero">
                <div class="hero-panel">
                    <p class="eyebrow">Meow Mart</p>
                    <h1 class="hero-title">Create Account</h1>
                    {% if form.errors %}
                        <p style="color:red;">Please fix the errors below.</p>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button class="btn btn-primary" type="submit">Register</button>
                    </form>
                    <br>
                    <a href="/login/">Already have an account? Sign in</a>
                </div>
            </section>
        </main>
    </body>
</html>
